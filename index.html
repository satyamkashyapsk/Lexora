<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Universal AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
height:100vh;
display:flex;
}

#sidebar{
width:250px;
background:#020617;
border-right:1px solid #1e293b;
display:flex;
flex-direction:column;
}

#newChat{
margin:10px;
padding:10px;
background:#2563eb;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
}

#chat-list{
flex:1;
overflow:auto;
}

.chat-item{
padding:10px;
cursor:pointer;
border-bottom:1px solid #1e293b;
}

.chat-item:hover{
background:#1e293b;
}

.chat-active{
background:#1e293b;
}

.delete-btn{
float:right;
color:red;
cursor:pointer;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:20px;
}

.message{
margin-bottom:15px;
max-width:70%;
padding:10px;
border-radius:8px;
}

.user{
background:#2563eb;
margin-left:auto;
}

.assistant{
background:#1e293b;
}

#inputBox{
display:flex;
padding:10px;
border-top:1px solid #1e293b;
}

#input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

#send,#voice{
margin-left:10px;
padding:10px 15px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
border-radius:6px;
}

</style>
</head>
<body>

<div id="sidebar">

<button id="newChat">+ New Chat</button>

<div id="chat-list"></div>

</div>

<div id="main">

<div id="messages"></div>

<div id="inputBox">

<input id="input" placeholder="Ask something..." />

<button id="voice">🎤</button>

<button id="send">Send</button>

</div>

</div>

<script>

const state = {

apiKey: localStorage.getItem("apiKey") || "",
model:"deepseek/deepseek-chat:free",

chats: JSON.parse(localStorage.getItem("chats")) || [],
memory: JSON.parse(localStorage.getItem("memory")) || {},

activeChatId:null,
isGenerating:false

}

function saveChats(){
localStorage.setItem("chats",JSON.stringify(state.chats))
}

function saveMemory(){
localStorage.setItem("memory",JSON.stringify(state.memory))
}

function createNewChat(){

const chat={
id:"chat_"+Date.now(),
title:"New Chat",
messages:[]
}

state.chats.unshift(chat)
state.activeChatId=chat.id

saveChats()
renderSidebar()
renderMessages()

}

function getActiveChat(){
return state.chats.find(c=>c.id===state.activeChatId)
}

function renderSidebar(){

const container=document.getElementById("chat-list")
container.innerHTML=""

state.chats.forEach(chat=>{

const div=document.createElement("div")

div.className="chat-item"
if(chat.id===state.activeChatId) div.classList.add("chat-active")

div.innerHTML=`
${chat.title}
<span class="delete-btn">✖</span>
`

div.onclick=()=>{
state.activeChatId=chat.id
renderSidebar()
renderMessages()
}

div.querySelector(".delete-btn").onclick=(e)=>{

e.stopPropagation()

state.chats=state.chats.filter(c=>c.id!==chat.id)

if(state.activeChatId===chat.id){
state.activeChatId=state.chats[0]?.id||null
}

saveChats()
renderSidebar()
renderMessages()

}

container.appendChild(div)

})

}

function renderMessages(){

const container=document.getElementById("messages")
container.innerHTML=""

const chat=getActiveChat()
if(!chat) return

chat.messages.forEach(msg=>{

const div=document.createElement("div")
div.className="message "+msg.role
div.textContent=msg.content

container.appendChild(div)

})

container.scrollTop=container.scrollHeight

}

function rememberUser(text){

if(text.includes("my name is")){
const name=text.split("my name is")[1].trim()
state.memory.name=name
saveMemory()
}

}

async function internetSearch(query){

try{

const res=await fetch("https://api.duckduckgo.com/?q="+encodeURIComponent(query)+"&format=json")

const data=await res.json()

return data.Abstract || "No web results."

}catch{
return "Internet search failed."
}

}

function addMessage(role,content){

const chat=getActiveChat()

chat.messages.push({role,content})

if(chat.messages.length===1){
chat.title=content.slice(0,30)
}

saveChats()
renderSidebar()
renderMessages()

}

async function sendMessage(){

const input=document.getElementById("input")
const text=input.value.trim()

if(!text || state.isGenerating) return

input.value=""

rememberUser(text)

addMessage("user",text)

let webInfo=""

if(text.startsWith("search ")){

const q=text.replace("search ","")
webInfo=await internetSearch(q)

}

const chat=getActiveChat()

chat.messages.push({role:"assistant",content:""})
renderMessages()

state.isGenerating=true

const systemMemory = state.memory.name
? "User name is "+state.memory.name
: ""

try{

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer "+state.apiKey,
"Content-Type":"application/json"
},

body:JSON.stringify({

model:state.model,

stream:true,

messages:[
{role:"system",content:systemMemory+" "+webInfo},
...chat.messages
]

})

})

const reader=res.body.getReader()
const decoder=new TextDecoder()

while(true){

const {done,value}=await reader.read()

if(done) break

const chunk=decoder.decode(value)
const lines=chunk.split("\n")

for(let line of lines){

if(!line.startsWith("data:")) continue

const data=line.replace("data:","").trim()

if(data==="[DONE]") break

try{

const json=JSON.parse(data)
const token=json.choices?.[0]?.delta?.content

if(token){
chat.messages[chat.messages.length-1].content+=token
renderMessages()
}

}catch{}

}

}

}catch(e){

chat.messages[chat.messages.length-1].content="Error generating response."

}

state.isGenerating=false
saveChats()

}

document.getElementById("send").onclick=sendMessage

document.getElementById("input").addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage()
})

document.getElementById("newChat").onclick=createNewChat

/* Voice input */

const recognition = window.SpeechRecognition || window.webkitSpeechRecognition

if(recognition){

const mic = new recognition()

mic.continuous=false
mic.lang="en-US"

document.getElementById("voice").onclick=()=>{

mic.start()

}

mic.onresult=(e)=>{

document.getElementById("input").value=e.results[0][0].transcript

}

}

/* start */

document.addEventListener("DOMContentLoaded",()=>{

if(state.chats.length===0){
createNewChat()
}else{
state.activeChatId=state.chats[0].id
}

renderSidebar()
renderMessages()

})

</script>
</body>
</html>
