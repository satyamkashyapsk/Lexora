<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

body{
font-family:'Inter',sans-serif;
}

.theme-transition{
transition:background-color .3s,color .3s,border-color .3s;
}

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#e5e7eb;
border-radius:10px;
}

.dark ::-webkit-scrollbar-thumb{
background:#374151;
}

#app-container{
min-height:100vh;
display:flex;
flex-direction:column;
}

.prose pre{
background:#f3f4f6;
padding:1rem;
border-radius:.5rem;
overflow-x:auto;
}

.dark .prose pre{
background:#1f2937;
}

#loading{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:white;
z-index:9999;
}

.dark #loading{
background:#111827;
color:white;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;transform:translateY(0);}
}

.animate-fadeIn{
animation:fadeIn .25s ease;
}
</style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 theme-transition">

<div id="loading">
<div class="flex flex-col items-center">
<div class="animate-spin rounded-full h-12 w-12 border-t-2 border-blue-500"></div>
<p class="mt-4 text-gray-500">Loading Universal AI...</p>
</div>
</div>

<div id="app-container" class="hidden">

<header class="p-4 border-b bg-white dark:bg-gray-900 flex justify-between">
<h1 class="font-semibold dark:text-white">Universal AI</h1>

<button onclick="toggleDarkMode()" class="text-sm px-3 py-1 border rounded">
Theme
</button>
</header>

<div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-6"></div>

<div class="p-4 border-t bg-white dark:bg-gray-900">
<form onsubmit="handleChatSubmit(event)" class="flex gap-2">

<textarea
id="user-input"
rows="1"
placeholder="Type message..."
class="flex-1 p-3 border rounded-lg resize-none"
></textarea>

<button
class="bg-blue-600 text-white px-4 rounded-lg"
type="submit"
>
Send
</button>

</form>
</div>

</div>

<script>

marked.setOptions({
gfm:true,
breaks:true
})

let state={
apiKey:localStorage.getItem("api_key")||"",
model:localStorage.getItem("model")||"deepseek/deepseek-chat:free",
systemPrompt:localStorage.getItem("system_prompt")||
"You are a helpful AI assistant.",
darkMode:localStorage.getItem("dark_mode")==="true",
messages:[],
isGenerating:false
}

document.addEventListener("DOMContentLoaded",()=>{

initTheme()

document.getElementById("loading").style.display="none"
document.getElementById("app-container").classList.remove("hidden")

})

function toggleDarkMode(){

state.darkMode=!state.darkMode

localStorage.setItem("dark_mode",state.darkMode)

initTheme()

}

function initTheme(){

if(state.darkMode){
document.documentElement.classList.add("dark")
}else{
document.documentElement.classList.remove("dark")
}

}

function renderMessages(){

const container=document.getElementById("messages-container")

if(state.messages.length===0){

container.innerHTML=`
<div class="text-center mt-20 text-gray-500">
<h2 class="text-2xl mb-2">How can I help you?</h2>
<p>Start chatting with Universal AI</p>
</div>
`

return
}

container.innerHTML=state.messages.map((m,i)=>`

<div class="flex ${m.role==="user"?"justify-end":"justify-start"} animate-fadeIn">

<div class="max-w-[70%] p-4 rounded-2xl
${m.role==="user"
?"bg-blue-600 text-white"
:"bg-white dark:bg-gray-800 dark:text-white border"}">

<div class="prose dark:prose-invert" id="msg-${i}">
${marked.parse(m.content)}
</div>

</div>

</div>

`).join("")

container.scrollTop=container.scrollHeight

}

async function handleChatSubmit(e){

e.preventDefault()

if(state.isGenerating)return

const input=document.getElementById("user-input")

const text=input.value.trim()

if(!text)return

if(!state.apiKey){

alert("Add OpenRouter API key in code first")

return

}

state.messages.push({
role:"user",
content:text
})

input.value=""

renderMessages()

state.messages.push({
role:"assistant",
content:"..."
})

renderMessages()

const aiIndex=state.messages.length-1

state.isGenerating=true

try{

const response=await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",
headers:{
Authorization:`Bearer ${state.apiKey}`,
"Content-Type":"application/json",
"HTTP-Referer":location.origin,
"X-Title":"Universal AI"
},
body:JSON.stringify({
model:state.model,
messages:[
{role:"system",content:state.systemPrompt},
...state.messages.slice(0,-1)
],
stream:true
})
}
)

if(!response.ok){
throw new Error(await response.text())
}

const reader=response.body.getReader()

const decoder=new TextDecoder()

let full=""

while(true){

const {done,value}=await reader.read()

if(done)break

const chunk=decoder.decode(value)

const lines=chunk.split("\n")

for(const line of lines){

if(line.startsWith("data: ")){

const data=line.slice(6)

if(data==="[DONE]"){
reader.cancel()
break
}

try{

const json=JSON.parse(data)

const content=json.choices?.[0]?.delta?.content||""

full+=content

state.messages[aiIndex].content=full

document.getElementById("msg-"+aiIndex).innerHTML=
marked.parse(full)

}catch{}

}

}

}

}catch(err){

state.messages[aiIndex].content="Error: "+err.message

renderMessages()

}

state.isGenerating=false

}

</script>

</body>
</html>
