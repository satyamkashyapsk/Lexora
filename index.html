<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI - Gemini Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        /* Smooth transition for theme switching */
        .theme-transition { transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }

        /* Prevent layout shift on mobile */
        #app-container { min-height: 100svh; display: flex; flex-direction: column; }
        
        /* Markdown Styling */
        .prose pre { background: #f3f4f6; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
        .dark .prose pre { background: #1f2937; }
        .prose code { font-family: monospace; font-size: 0.9em; }
        
        #loading {
            position: fixed; inset: 0; background: white; display: flex;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .dark #loading { background: #111827; color: white; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 theme-transition">

    <div id="loading">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
            <p class="text-gray-600 dark:text-gray-400">Initializing Gemini AI...</p>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">
            <div class="p-4 flex items-center justify-between">
                <button onclick="createNewChat()" class="flex items-center gap-2 px-4 py-2 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full hover:bg-blue-100 transition-colors w-full font-medium">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
                    New Chat
                </button>
            </div>

            <div id="chat-history" class="flex-1 overflow-y-auto px-3 space-y-1">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
                <button onclick="toggleSettings()" class="flex items-center gap-3 w-full p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg text-gray-700 dark:text-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                    Settings
                </button>
                <button onclick="toggleDarkMode()" class="flex items-center gap-3 w-full p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg text-gray-700 dark:text-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Toggle Theme
                </button>
            </div>
        </aside>

        <main class="flex-1 lg:ml-72 flex flex-col relative h-full">
            <header class="p-4 flex items-center justify-between border-b border-gray-200 dark:border-gray-700 bg-white/80 dark:bg-gray-900/80 backdrop-blur sticky top-0 z-30">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 text-gray-600 dark:text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <h1 id="current-chat-title" class="font-semibold text-gray-800 dark:text-gray-100 truncate max-w-xs">New Conversation</h1>
                <div class="w-10"></div> </header>

            <div id="messages-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-32">
                <div id="welcome-ui" class="flex flex-col items-center justify-center min-h-[50vh] text-center space-y-4">
                    <div class="w-16 h-16 bg-blue-500 rounded-full flex items-center justify-center text-white text-3xl font-bold shadow-lg">G</div>
                    <h2 class="text-2xl font-semibold dark:text-white">How can I help you today?</h2>
                    <p class="text-gray-500 dark:text-gray-400 max-w-md">Connect your OpenRouter API key in settings to start chatting with DeepSeek or other models.</p>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 right-0 lg:left-72 bg-gradient-to-t from-gray-50 via-gray-50 to-transparent dark:from-gray-900 dark:via-gray-900 p-4 pb-6 md:pb-8">
                <div class="max-w-4xl mx-auto relative">
                    <form id="chat-form" onsubmit="handleChatSubmit(event)" class="relative flex items-end gap-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-2xl p-2 shadow-lg focus-within:ring-2 focus-within:ring-blue-500 transition-all">
                        <textarea id="user-input" rows="1" placeholder="Type a message..." class="w-full bg-transparent border-none focus:ring-0 py-3 px-4 resize-none text-gray-800 dark:text-gray-100 max-h-48" oninput="autoResize(this)"></textarea>
                        <button type="submit" id="send-btn" class="p-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 rotate-90" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" /></svg>
                        </button>
                    </form>
                    <p class="text-[10px] text-center mt-2 text-gray-400">AI can make mistakes. Check important info.</p>
                </div>
            </div>
        </main>

        <div id="settings-modal" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-center justify-center p-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md p-6 shadow-2xl">
                <h2 class="text-xl font-bold mb-4 dark:text-white">Settings</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">OpenRouter API Key</label>
                        <input type="password" id="api-key-input" class="w-full p-2 rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="sk-or-...">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Model ID</label>
                        <input type="text" id="model-input" class="w-full p-2 rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="deepseek/deepseek-r1:free">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">System Prompt</label>
                        <textarea id="system-prompt-input" rows="3" class="w-full p-2 rounded-lg border dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="You are a helpful assistant..."></textarea>
                    </div>
                </div>
                <div class="mt-6 flex justify-end gap-3">
                    <button onclick="toggleSettings()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700 rounded-lg">Cancel</button>
                    <button onclick="saveSettings()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Core State Management ---
        let state = {
            apiKey: localStorage.getItem('api_key') || '',
            model: localStorage.getItem('model') || 'deepseek/deepseek-r1:free',
            systemPrompt: localStorage.getItem('system_prompt') || 'You are a helpful AI assistant.',
            darkMode: localStorage.getItem('dark_mode') === 'true',
            chats: JSON.parse(localStorage.getItem('chats')) || [],
            activeChatId: null,
            isGenerating: false
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            renderChatHistory();
            
            // Hide loader
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app-container').classList.remove('hidden');

            // Fill settings inputs
            document.getElementById('api-key-input').value = state.apiKey;
            document.getElementById('model-input').value = state.model;
            document.getElementById('system-prompt-input').value = state.systemPrompt;

            if (state.chats.length > 0) {
                switchChat(state.chats[0].id);
            }
        });

        // --- UI Logic ---
        function toggleDarkMode() {
            state.darkMode = !state.darkMode;
            localStorage.setItem('dark_mode', state.darkMode);
            initTheme();
        }

        function initTheme() {
            if (state.darkMode) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
        }

        function saveSettings() {
            state.apiKey = document.getElementById('api-key-input').value.trim();
            state.model = document.getElementById('model-input').value.trim();
            state.systemPrompt = document.getElementById('system-prompt-input').value.trim();
            
            localStorage.setItem('api_key', state.apiKey);
            localStorage.setItem('model', state.model);
            localStorage.setItem('system_prompt', state.systemPrompt);
            
            toggleSettings();
            alert('Settings saved!');
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        // --- Chat Logic ---
        function createNewChat() {
            const newChat = {
                id: Date.now().toString(),
                title: 'New Conversation',
                messages: []
            };
            state.chats.unshift(newChat);
            saveChats();
            switchChat(newChat.id);
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function switchChat(id) {
            state.activeChatId = id;
            const chat = state.chats.find(c => c.id === id);
            document.getElementById('current-chat-title').innerText = chat.title;
            renderMessages();
            renderChatHistory();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.activeChatId === id) {
                state.activeChatId = state.chats.length > 0 ? state.chats[0].id : null;
            }
            saveChats();
            renderChatHistory();
            renderMessages();
        }

        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(state.chats));
        }

        // --- Messaging & Streaming ---
        async function handleChatSubmit(e) {
            e.preventDefault();
            if (state.isGenerating) return;

            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            if (!state.apiKey) {
                alert("Please add your OpenRouter API Key in Settings first.");
                toggleSettings();
                return;
            }

            // If no active chat, create one
            if (!state.activeChatId) {
                const newChat = { id: Date.now().toString(), title: text.substring(0, 30), messages: [] };
                state.chats.unshift(newChat);
                state.activeChatId = newChat.id;
            }

            const activeChat = state.chats.find(c => c.id === state.activeChatId);
            
            // Add user message
            activeChat.messages.push({ role: 'user', content: text });
            if (activeChat.title === 'New Conversation') activeChat.title = text.substring(0, 30);
            
            input.value = '';
            autoResize(input);
            renderMessages();
            renderChatHistory();

            // Prep AI message
            state.isGenerating = true;
            const aiMessageIndex = activeChat.messages.length;
            activeChat.messages.push({ role: 'assistant', content: '' });
            renderMessages();

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.apiKey}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.origin,
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: [
                            { role: "system", content: state.systemPrompt },
                            ...activeChat.messages.slice(0, -1)
                        ],
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(await response.text());

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') break;
                            try {
                                const json = JSON.parse(data);
                                const content = json.choices[0]?.delta?.content || "";
                                fullContent += content;
                                activeChat.messages[aiMessageIndex].content = fullContent;
                                updateLastMessageUI(fullContent);
                            } catch (e) { /* ignore partial chunks */ }
                        }
                    }
                }
            } catch (err) {
                activeChat.messages[aiMessageIndex].content = `**Error:** ${err.message}`;
                renderMessages();
            } finally {
                state.isGenerating = false;
                saveChats();
            }
        }

        // Optimized UI Updates
        function renderMessages() {
            const container = document.getElementById('messages-container');
            const chat = state.chats.find(c => c.id === state.activeChatId);
            
            if (!chat || chat.messages.length === 0) {
                document.getElementById('welcome-ui').classList.remove('hidden');
                container.innerHTML = '';
                container.appendChild(document.getElementById('welcome-ui'));
                return;
            }

            document.getElementById('welcome-ui').classList.add('hidden');
            container.innerHTML = chat.messages.map((m, idx) => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-fadeIn">
                    <div class="max-w-[85%] md:max-w-[70%] rounded-2xl p-4 ${
                        m.role === 'user' 
                        ? 'bg-blue-600 text-white shadow-md' 
                        : 'bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 dark:text-gray-100 shadow-sm'
                    }">
                        <div class="prose dark:prose-invert max-w-none text-sm md:text-base leading-relaxed" id="msg-${idx}">
                            ${marked.parse(m.content || (state.isGenerating && idx === chat.messages.length -1 ? '...' : ''))}
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function updateLastMessageUI(content) {
            const container = document.getElementById('messages-container');
            const chat = state.chats.find(c => c.id === state.activeChatId);
            const lastIdx = chat.messages.length - 1;
            const msgElement = document.getElementById(`msg-${lastIdx}`);
            if (msgElement) {
                msgElement.innerHTML = marked.parse(content);
                container.scrollTop = container.scrollHeight;
            }
        }

        function renderChatHistory() {
            const historyList = document.getElementById('chat-history');
            historyList.innerHTML = state.chats.map(chat => `
                <div onclick="switchChat('${chat.id}')" class="group flex items-center justify-between p-3 rounded-lg cursor-pointer transition-all ${state.activeChatId === chat.id ? 'bg-gray-200 dark:bg-gray-700 text-blue-600' : 'hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300'}">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>
                        <span class="truncate text-sm font-medium">${chat.title}</span>
                    </div>
                    <button onclick="deleteChat('${chat.id}', event)" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition-opacity">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
